# CI for news-tok — typecheck + tests on every PR + push to main.
# Kept intentionally minimal: no smoke renders (they pull ffmpeg / network),
# no full build (the Studio Next.js build is ~2 min and not yet needed for
# correctness checks). When the test suite grows beyond `shared`, extend
# the matrix or split into parallel jobs.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on a branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test
